  route: private_erp_backend
services:
- connect_timeout: 60000
  enabled: true
  name: ERP_Backend
  url: ${APP_BASE_URL}
  read_timeout: 60000
  retries: 5
  routes:
  - https_redirect_status_code: 426
    name: admin_route_erp_backend
    path_handling: v0
    paths:
    - /api/admin/*
    plugins:
    - config:
        anonymous: null
        claims_to_verify:
        - exp
        cookie_names: []
        header_names:
        - authorization
        key_claim_name: iss
        maximum_expiration: 0
        run_on_preflight: true
        secret_is_base64: false
        uri_param_names:
        - jwt
      enabled: true
      name: jwt
      protocols:
      - grpc
      - grpcs
      - http
      - https
    - config:
        access:
        - |
          local cjson = require "cjson"
          local auth_header = kong.request.get_header("Authorization")
          if not auth_header then return end
          local token = auth_header:match("^[Bb]earer%s+(.+)$")
          if not token then return end
          local parts = {}
          for part in token:gmatch("[^.]+") do parts[#parts + 1] = part end
          if #parts ~= 3 then return end
          local payload_b64 = parts[2]
          payload_b64 = payload_b64:gsub("-", "+"):gsub("_", "/")
          local padding = #payload_b64 % 4
          if padding == 2 then payload_b64 = payload_b64 .. "=="
          elseif padding == 3 then payload_b64 = payload_b64 .. "=" end
          local decoded = ngx.decode_base64(payload_b64)
          if not decoded then return end
          local ok, payload = pcall(cjson.decode, decoded)
          if not ok or type(payload) ~= "table" then return end
          if payload.sub then kong.service.request.set_header("X-Authenticated-Userid", payload.sub) end
          if payload.tenant_id then kong.service.request.set_header("X-Tenant-Id", payload.tenant_id) end
          if payload.role then kong.service.request.set_header("X-User-Role", payload.role) end
          if payload.permissions then kong.service.request.set_header("X-User-Permissions", table.concat(payload.permissions, ",")) end
          kong.service.request.set_header("X-User-Timezone", payload.timezone or "UTC")
          if payload.jti then kong.service.request.set_header("X-User-Jti", payload.jti) end
      enabled: true
      name: post-function
      protocols:
      - http
      - https
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: false
    tags:
    - admin
    - erp_backend
  - https_redirect_status_code: 426
    name: private_erp_backend
    path_handling: v0
    paths:
    - /api/private/*
    plugins:
    - config:
        anonymous: null
        claims_to_verify:
        - exp
        cookie_names: []
        header_names:
        - authorization
        key_claim_name: iss
        maximum_expiration: 0
        run_on_preflight: true
        secret_is_base64: false
        uri_param_names:
        - jwt
      enabled: true
      instance_name: JWT
      name: jwt
      protocols:
      - http
      - https
      tags:
      - js
      - nextjs
      - ERP_Backend
    - config:
        access:
        - |
          local cjson = require "cjson"
          local auth_header = kong.request.get_header("Authorization")
          if not auth_header then return end
          local token = auth_header:match("^[Bb]earer%s+(.+)$")
          if not token then return end
          local parts = {}
          for part in token:gmatch("[^.]+") do parts[#parts + 1] = part end
          if #parts ~= 3 then return end
          local payload_b64 = parts[2]
          payload_b64 = payload_b64:gsub("-", "+"):gsub("_", "/")
          local padding = #payload_b64 % 4
