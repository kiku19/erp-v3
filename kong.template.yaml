          if payload.sub then kong.service.request.set_header("X-Authenticated-Userid", payload.sub) end
          if payload.tenant_id then kong.service.request.set_header("X-Tenant-Id", payload.tenant_id) end
          if payload.role then kong.service.request.set_header("X-User-Role", payload.role) end
          if payload.permissions then kong.service.request.set_header("X-User-Permissions", table.concat(payload.permissions, ",")) end
          kong.service.request.set_header("X-User-Timezone", payload.timezone or "UTC")
          if payload.jti then kong.service.request.set_header("X-User-Jti", payload.jti) end
      enabled: true
      name: post-function
      protocols:
