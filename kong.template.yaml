    - closed
    - erp_backend
  - https_redirect_status_code: 426
    name: public_route_erp_backend
    path_handling: v0
    paths:
    - /api/public/*
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: false
    tags:
    - public
    - erp_backend
    - open
  tags:
  - backend
  - ' nextjs'
  - ' js'
