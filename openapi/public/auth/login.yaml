openapi: 3.0.3
info:
  title: Auth API
  description: Authentication endpoints for user login, refresh, and logout
  version: 1.0.0

paths:
  /api/public/auth/login:
    post:
      summary: Login user
      description: |
        Authenticates a user and returns access and refresh tokens.
        Database: PostgreSQL with Prisma (auth/RBAC data)
      operationId: login
      x-used-by:
        - "src/app/api/public/auth/login/route.ts"
        - "src/app/login/page.tsx"
        - "src/app/dashboard/page.tsx"
        - "src/app/admin-panel/page.tsx"
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: "admin"
              password: "admin123"
              timezone: "Asia/Kolkata"
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        422:
          $ref: '#/components/responses/ValidationError'
        500:
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          description: User's username
        password:
          type: string
          minLength: 1
          description: User's password
        timezone:
          type: string
          description: User's timezone (IANA format). Defaults to UTC if not provided.
          default: "UTC"
          example: "Asia/Kolkata"

    UserResponse:
      type: object
      required:
        - id
        - username
        - tenantId
        - role
        - permissions
        - timezone
        - defaultRedirectPath
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        tenantId:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, admin, superadmin]
        permissions:
          type: array
          items:
            type: string
        timezone:
          type: string
          example: "Asia/Kolkata"
        defaultRedirectPath:
          type: string
          description: The default path to redirect the user to after login (stored per user in the database)
          example: "/dashboard"

    LoginResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required:
            - accessToken
            - refreshToken
            - expiresIn
            - user
          properties:
            accessToken:
              type: string
              description: JWT access token
            refreshToken:
              type: string
              description: Refresh token for token rotation
            expiresIn:
              type: integer
              description: Access token expiration in seconds
            user:
              $ref: '#/components/schemas/UserResponse'

    ErrorResponse:
      type: object
      required:
        - success
        - error
        - traceId
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
        traceId:
          type: string
          format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
