openapi: 3.0.3
info:
  title: Admin Auth API
  description: Admin endpoints for auth user management
  version: 1.0.0

paths:
  /api/admin/auth/users:
    post:
      summary: Create a new auth user
      description: |
        Creates a new user in the auth system (PostgreSQL).
        Requires admin or superadmin role with users:write permission.
        By default, tenant_id is derived from the authenticated admin's context.
        A superadmin may pass tenantId in the request body to create a user in a different tenant.
        This is the second step of the two-step tenant onboarding flow:
          1. POST /api/admin/tenants → create Tenant, get tenantId
          2. POST /api/admin/auth/users → create admin user with that tenantId (superadmin only)
        Database: PostgreSQL with Prisma (auth/RBAC data)
      operationId: createAuthUser
      x-used-by:
        - "src/app/api/admin/auth/users/route.ts"
      tags:
        - Admin Auth
      security:
        - bearerAuth: []
      parameters:
        - name: X-Authenticated-Userid
          in: header
          required: true
          description: User ID forwarded by Kong after JWT validation
          schema:
            type: string
            format: uuid
        - name: X-Timezone
          in: header
          required: false
          description: IANA timezone string (e.g. Asia/Kolkata). Defaults to UTC if absent.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              username: "john_doe"
              password: "securepassword"
              role: "user"
              permissions: ["users:read"]
              timezone: "Asia/Kolkata"
      responses:
        201:
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        403:
          $ref: '#/components/responses/Forbidden'
        404:
          $ref: '#/components/responses/NotFound'
        409:
          $ref: '#/components/responses/Conflict'
        422:
          $ref: '#/components/responses/ValidationError'
        500:
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateUserRequest:
      type: object
      required:
        - username
        - password
        - role
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: Unique username for the new user
        password:
          type: string
          minLength: 6
          description: Plain-text password (will be hashed server-side)
        role:
          type: string
          enum: [user, admin, superadmin]
          description: Role assigned to the new user
        permissions:
          type: array
          items:
            type: string
          default: []
          description: Granular permission strings (e.g. users:read, invoices:write)
        timezone:
          type: string
          default: "UTC"
          description: IANA timezone for this user (e.g. Asia/Kolkata)
        tenantId:
          type: string
          format: uuid
          description: |
            Superadmin only — creates the user in the specified tenant.
            If omitted, the user is created in the caller's own tenant.
            Must reference an existing tenant (created via POST /api/admin/tenants).

    CreatedUser:
      type: object
      required:
        - id
        - username
        - tenantId
        - role
        - permissions
        - timezone
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        tenantId:
          type: string
          format: uuid
          description: Inherited from the creating admin's tenant context
        role:
          type: string
          enum: [user, admin, superadmin]
        permissions:
          type: array
          items:
            type: string
        timezone:
          type: string
        createdAt:
          type: string
          format: date-time
          description: UTC timestamp of creation

    CreateUserResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/CreatedUser'

    ErrorResponse:
      type: object
      required:
        - success
        - error
        - traceId
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
        traceId:
          type: string
          format: uuid

  responses:
    BadRequest:
      description: Bad request (e.g. invalid X-Timezone header)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized — missing or invalid JWT / identity header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden — insufficient role or missing users:write permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found — specified tenantId does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict — username already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error — request body failed schema validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
