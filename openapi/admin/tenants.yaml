openapi: 3.0.3
info:
  title: Admin Tenants API
  description: Admin endpoints for tenant management
  version: 1.0.0

paths:
  /api/admin/tenants:
    post:
      summary: Create a new tenant (superadmin only)
      description: |
        Creates a minimal tenant record in PostgreSQL (auth infrastructure).
        Business data (profiles, billing, settings) is stored in MongoDB per module, keyed by tenantId.
        Requires superadmin role with tenants:write permission.
        Step 1 of the two-step tenant onboarding flow:
          1. POST /api/admin/tenants          → creates Tenant, returns tenantId
          2. POST /api/admin/auth/users       → creates first admin user with that tenantId
      operationId: createTenant
      x-used-by:
        - "src/app/api/admin/tenants/route.ts"
      tags:
        - Admin Tenants
      security:
        - bearerAuth: []
      parameters:
        - name: X-Authenticated-Userid
          in: header
          required: true
          description: User ID forwarded by Kong after JWT validation
          schema:
            type: string
            format: uuid
        - name: X-Timezone
          in: header
          required: false
          description: IANA timezone string (e.g. Asia/Kolkata). Defaults to UTC if absent.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
            example:
              name: "Acme Corp"
      responses:
        201:
          description: Tenant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTenantResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        403:
          $ref: '#/components/responses/Forbidden'
        422:
          $ref: '#/components/responses/ValidationError'
        500:
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateTenantRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Human-readable name for the tenant (e.g. company name)

    CreatedTenant:
      type: object
      required:
        - id
        - name
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique tenant identifier — use this as tenantId when creating the first admin user
        name:
          type: string
        status:
          type: string
          enum: [active, suspended]
          description: Tenant status; newly created tenants default to active
        createdAt:
          type: string
          format: date-time
          description: UTC timestamp of creation

    CreateTenantResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/CreatedTenant'

    ErrorResponse:
      type: object
      required:
        - success
        - error
        - traceId
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
        traceId:
          type: string
          format: uuid

  responses:
    BadRequest:
      description: Bad request (e.g. invalid X-Timezone header)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized — missing or invalid JWT / identity header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden — insufficient role (superadmin required) or missing tenants:write permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error — request body failed schema validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
